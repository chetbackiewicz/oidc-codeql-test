name: "CodeQL Regular Scan (No Private Dependencies)"

on:
    push:
        branches: [test-branch-regular-build]
    pull_request:
        branches: [test-branch-regular-build]

permissions:
    contents: read # Required for actions/checkout
    security-events: write # Required for uploading CodeQL results
    actions: read # Required for private repo workflows

jobs:
    analyze:
        name: Analyze Java (without CodeArtifact)
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                language: ["java-kotlin"]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            # Initialize CodeQL for Java analysis
            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: ${{ matrix.language }}
                  queries: security-extended

            # Build with Maven — NO CodeArtifact auth, so shared-utils will fail to resolve
            - name: Build with Maven
              run: |
                  cd vuln-app
                  mvn compile -B

            # Run CodeQL analysis and upload results
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:${{ matrix.language }}"
